<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 180" width="40" height="180">
  <!-- Torah-style scroll finial - left end -->
  <defs>
    <linearGradient id="wood_l" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4A2810"/>
      <stop offset="30%" stop-color="#6B3A1A"/>
      <stop offset="70%" stop-color="#8B5A2B"/>
      <stop offset="100%" stop-color="#6B3A1A"/>
    </linearGradient>
    <linearGradient id="knob_l" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3A1E08"/>
      <stop offset="50%" stop-color="#5C3A1E"/>
      <stop offset="100%" stop-color="#3A1E08"/>
    </linearGradient>
  </defs>
  <!-- Top finial knob -->
  <ellipse cx="20" cy="12" rx="18" ry="12" fill="url(#knob_l)"/>
  <ellipse cx="20" cy="12" rx="14" ry="8" fill="url(#wood_l)"/>
  <!-- Top turned ring -->
  <rect x="6" y="20" width="28" height="6" rx="3" fill="url(#knob_l)"/>
  <rect x="10" y="24" width="20" height="4" rx="2" fill="url(#wood_l)"/>
  <!-- Main shaft -->
  <rect x="12" y="28" width="16" height="124" rx="2" fill="url(#wood_l)"/>
  <!-- Decorative rings on shaft -->
  <rect x="10" y="50" width="20" height="3" rx="1.5" fill="url(#knob_l)" opacity="0.6"/>
  <rect x="10" y="88" width="20" height="3" rx="1.5" fill="url(#knob_l)" opacity="0.6"/>
  <rect x="10" y="126" width="20" height="3" rx="1.5" fill="url(#knob_l)" opacity="0.6"/>
  <!-- Bottom turned ring -->
  <rect x="10" y="152" width="20" height="4" rx="2" fill="url(#wood_l)"/>
  <rect x="6" y="154" width="28" height="6" rx="3" fill="url(#knob_l)"/>
  <!-- Bottom finial knob -->
  <ellipse cx="20" cy="168" rx="14" ry="8" fill="url(#wood_l)"/>
  <ellipse cx="20" cy="168" rx="18" ry="12" fill="url(#knob_l)"/>
</svg>
