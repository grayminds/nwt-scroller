<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 96">
  <defs>
    <linearGradient id="shaft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3A1E0A"/>
      <stop offset="20%" stop-color="#5C3A1E"/>
      <stop offset="50%" stop-color="#7B4A2A"/>
      <stop offset="80%" stop-color="#5C3A1E"/>
      <stop offset="100%" stop-color="#3A1E0A"/>
    </linearGradient>
    <radialGradient id="knob" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#8B5E3C"/>
      <stop offset="40%" stop-color="#6B3A1A"/>
      <stop offset="80%" stop-color="#4A2810"/>
      <stop offset="100%" stop-color="#2E1608"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2E1608"/>
      <stop offset="40%" stop-color="#5C3A1E"/>
      <stop offset="60%" stop-color="#5C3A1E"/>
      <stop offset="100%" stop-color="#2E1608"/>
    </linearGradient>
    <linearGradient id="highlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.15"/>
    </linearGradient>
  </defs>
  <!-- Top finial knob (ball) -->
  <ellipse cx="28" cy="11" rx="24" ry="11" fill="url(#knob)"/>
  <ellipse cx="28" cy="11" rx="24" ry="11" fill="url(#highlight)"/>
  <!-- Top collar ring -->
  <rect x="6" y="20" width="44" height="6" rx="3" fill="url(#ring)"/>
  <!-- Upper shaft -->
  <rect x="14" y="26" width="28" height="16" fill="url(#shaft)"/>
  <!-- Upper decorative ring -->
  <rect x="11" y="38" width="34" height="4" rx="2" fill="url(#ring)" opacity="0.7"/>
  <!-- Middle shaft -->
  <rect x="14" y="42" width="28" height="12" fill="url(#shaft)"/>
  <!-- Center decorative ring -->
  <rect x="11" y="50" width="34" height="4" rx="2" fill="url(#ring)" opacity="0.7"/>
  <!-- Lower shaft -->
  <rect x="14" y="54" width="28" height="16" fill="url(#shaft)"/>
  <!-- Lower decorative ring -->
  <rect x="11" y="66" width="34" height="4" rx="2" fill="url(#ring)" opacity="0.7"/>
  <!-- Bottom collar ring -->
  <rect x="6" y="70" width="44" height="6" rx="3" fill="url(#ring)"/>
  <!-- Bottom finial knob (ball) -->
  <ellipse cx="28" cy="85" rx="24" ry="11" fill="url(#knob)"/>
  <ellipse cx="28" cy="85" rx="24" ry="11" fill="url(#highlight)"/>
  <!-- Subtle wood grain lines -->
  <line x1="20" y1="28" x2="20" y2="68" stroke="#2E1608" stroke-width="0.5" opacity="0.2"/>
  <line x1="28" y1="28" x2="28" y2="68" stroke="#8B5E3C" stroke-width="0.5" opacity="0.15"/>
  <line x1="36" y1="28" x2="36" y2="68" stroke="#2E1608" stroke-width="0.5" opacity="0.2"/>
</svg>
