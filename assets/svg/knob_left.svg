<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 48">
  <defs>
    <linearGradient id="litFace" x1="0" y1="0" x2="0.8" y2="0.8">
      <stop offset="0%" stop-color="#FFE898"/>
      <stop offset="50%" stop-color="#E8C458"/>
      <stop offset="100%" stop-color="#D4A830"/>
    </linearGradient>
    <linearGradient id="shadFace" x1="0.8" y1="0" x2="0" y2="0.8">
      <stop offset="0%" stop-color="#B08420"/>
      <stop offset="50%" stop-color="#8B6818"/>
      <stop offset="100%" stop-color="#6B4C10"/>
    </linearGradient>
    <linearGradient id="midLit" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F0D470"/>
      <stop offset="100%" stop-color="#C8A038"/>
    </linearGradient>
    <linearGradient id="midShad" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A88020"/>
      <stop offset="100%" stop-color="#785810"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F0D468"/>
      <stop offset="30%" stop-color="#C8A030"/>
      <stop offset="70%" stop-color="#A08020"/>
      <stop offset="100%" stop-color="#D8B848"/>
    </linearGradient>
    <clipPath id="lc"><rect x="0" y="0" width="24" height="48"/></clipPath>
  </defs>
  <g clip-path="url(#lc)">
    <circle cx="24" cy="24" r="19" fill="none" stroke="url(#ring)" stroke-width="1.2"/>
    <circle cx="24" cy="24" r="8" fill="none" stroke="url(#ring)" stroke-width="1.0" opacity="0.85"/>
    <line x1="24" y1="3" x2="24" y2="7" stroke="#C8A030" stroke-width="1" opacity="0.7"/>
    <line x1="24" y1="41" x2="24" y2="45" stroke="#C8A030" stroke-width="1" opacity="0.7"/>
    <line x1="3" y1="24" x2="7" y2="24" stroke="#C8A030" stroke-width="1" opacity="0.7"/>
    <line x1="9" y1="9" x2="12" y2="12" stroke="#C8A030" stroke-width="0.7" opacity="0.5"/>
    <line x1="9" y1="39" x2="12" y2="36" stroke="#C8A030" stroke-width="0.7" opacity="0.5"/>
    <!-- N left face -->
    <polygon points="24,2 21,17 24,24" fill="url(#litFace)"/>
    <!-- S left face -->
    <polygon points="24,46 21,31 24,24" fill="url(#shadFace)"/>
    <!-- W both faces -->
    <polygon points="2,24 17,27 24,24" fill="url(#litFace)"/>
    <polygon points="2,24 17,21 24,24" fill="url(#shadFace)"/>
    <!-- NW -->
    <polygon points="13,13 17,21 24,24" fill="url(#midLit)"/>
    <polygon points="13,13 21,17 24,24" fill="url(#midShad)"/>
    <!-- SW -->
    <polygon points="13,35 21,31 24,24" fill="url(#midLit)"/>
    <polygon points="13,35 17,27 24,24" fill="url(#midShad)"/>
    <!-- Bevel highlights -->
    <line x1="24" y1="2" x2="21" y2="17" stroke="#FFE898" stroke-width="0.5" opacity="0.6"/>
    <line x1="2" y1="24" x2="17" y2="27" stroke="#FFE898" stroke-width="0.5" opacity="0.6"/>
    <line x1="2" y1="24" x2="17" y2="21" stroke="#6B4C10" stroke-width="0.5" opacity="0.5"/>
    <!-- Center lines -->
    <line x1="24" y1="2" x2="24" y2="24" stroke="#6B4C10" stroke-width="0.6" opacity="0.5"/>
    <line x1="2" y1="24" x2="24" y2="24" stroke="#6B4C10" stroke-width="0.6" opacity="0.5"/>
    <line x1="24" y1="46" x2="24" y2="24" stroke="#6B4C10" stroke-width="0.6" opacity="0.5"/>
    <!-- Center boss -->
    <circle cx="24" cy="24" r="3.5" fill="#D4A830" stroke="#8B6818" stroke-width="0.8"/>
    <circle cx="23" cy="23" r="1.2" fill="#FFE898" opacity="0.5"/>
  </g>
</svg>
